<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alala ng Kahapon | PIXELINDI 2015</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Opening Splash Screen -->
    <div id="splash-screen">
        <div class="logo">PIXELINDI</div>
        <div class="dev">Likha ni: Denton Sagmayao</div>
        <div class="year">© 2015</div>
        <div class="press-start">Pindutin ang SPACE para magsimula</div>
    </div>

    <!-- Main Game Container -->
    <div id="game-container" class="hidden">
        <!-- Background / Map -->
        <div id="background"></div>

        <!-- Characters -->
        <div id="char-matt" class="character"></div>
        <div id="char-milca" class="character"></div>

        <!-- Dialog Box -->
        <div id="dialog-box">
            <div id="char-name"></div>
            <div id="dialog-text"></div>
        </div>

        <!-- Choices -->
        <div id="choices" class="hidden"></div>

        <!-- Ending Screen -->
        <div id="ending-screen" class="hidden">
            <div id="ending-title"></div>
            <div id="ending-text"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
