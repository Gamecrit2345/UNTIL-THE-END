
<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alala ng Kahapon | PIXELINDI 2015</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Opening Splash Screen -->
<div id="splash">
    <div class="splash-content">
        <h1>PIXELINDI</h1>
        <p>Likha ni: Denton Sagmayao</p>
        <p>© 2015</p>
        <p class="start-text">Pindutin ang SPACE para magsimula</p>
    </div>
</div>

<!-- Main Game Screen -->
<div id="game" class="hidden">
    <div id="background"></div>

    <!-- Characters -->
    <div id="char-matt" class="char"></div>
    <div id="char-milca" class="char"></div>

    <!-- Dialog Box -->
    <div id="dialog-box">
        <div id="char-name"></div>
        <div id="dialog-text"></div>
    </div>

    <!-- Choices -->
    <div id="choices" class="hidden"></div>

    <!-- Ending Screen -->
    <div id="ending" class="hidden">
        <h2 id="ending-title"></h2>
        <p id="ending-text"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
